@if (visible()) {
<div class="modal-overlay" role="presentation" (click)="cerrarModal()">
    <section class="modal-card" role="dialog" aria-modal="true" aria-label="Resultado de la partida"
        (click)="$event.stopPropagation()">
        <header class="modal-header" [class.ganador]="tipo() === 'ganador'" [class.perdedor]="tipo() === 'perdedor'"
            [class.empate]="tipo() === 'empate'">
            <h2>{{ titulo() }}</h2>
        </header>

        <p class="modal-message">{{ mensaje() }}</p>

        <button type="button" class="modal-close" (click)="cerrarModal()">Continuar</button>
    </section>
</div>
}
